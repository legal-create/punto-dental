async function doLogin(){
  const user=document.getElementById('user').value.toLowerCase();
  const pwd=document.getElementById('pwd').value;
  if(usuarios[user]&&usuarios[user]===pwd){
    usuarioActual=user;
    rolActual=user==='dra. maria'?'admin':'trabajador';
    userId=user;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    await cargarDeSupabase();
    renderTabs();
    mostrarPestana(rolActual==='admin'?'dashboard':'pacientes');
    setInterval(cargarDeSupabase,2500);
  } else alert('USUARIO O CONTRASEÑA INCORRECTOS');
}

async function cargarDeSupabase(){
  try{
    const {data}=await supabaseClient.from('dental').select('datos').eq('user_id',userId).maybeSingle();
    if(data&&data.datos){
      const parsed=typeof data.datos==='string'?JSON.parse(data.datos):data.datos;
      Object.assign(datos,parsed);
      if(!datos.finanzas)datos.finanzas={ingresos:[],egresos:[]};
      if(!datos.historias)datos.historias=[];
      if(!datos.recetas)datos.recetas=[];
      if(!datos.driveFiles)datos.driveFiles={};
      const el=document.activeElement;
      if(pestana&&(!el||(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA'&&el.tagName!=='SELECT')))renderCurrent();
    }
  }catch(e){console.log('Primer acceso o error de carga',e)}
}

async function guardar(){
  try{
    await supabaseClient.from('dental').upsert({user_id:userId,datos:datos},{onConflict:'user_id'});
  }catch(e){console.error('Error guardando:',e)}
}

function renderTabs(){
  let html='';
  const filtradas=rolActual==='admin'?entidades:entidades.filter(e=>e.id!=='dashboard');
  filtradas.forEach(e=>{html+=`<button class="tab-btn ${e.id===pestana?'active':''}" onclick="mostrarPestana('${e.id}')">${e.nombre}</button>`});
  html+=`<button class="tab-btn" style="margin-left:auto" onclick="doLogout()">Salir</button>`;
  document.getElementById('tabs').innerHTML=html;
}

function doLogout(){
  usuarioActual=null;rolActual=null;datos={pacientes:[],citas:[],finanzas:{ingresos:[],egresos:[]},historias:[],recetas:[]};
  googleAccessToken=null;
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('user').value='';
  document.getElementById('pwd').value='';
}

function mostrarPestana(id){
  pestana=id;renderTabs();renderCurrent();
}
function renderCurrent(){
  if(pestana==='dashboard')dashboard();
  else if(pestana==='pacientes')pacientes();
  else if(pestana==='agenda')agenda();
  else if(pestana==='finanzas')finanzas();
  else if(pestana==='historias')historias();
  else if(pestana==='recetario')recetario();
}

function nombrePaciente(id){const p=datos.pacientes.find(x=>x.id===id);return p?p.nombre:'—'}

function dashboard(){
  const citasHoy=datos.citas.filter(c=>c.fecha===hoy()).sort((a,b)=>a.hora.localeCompare(b.hora));
  const mesActual=new Date().toISOString().slice(0,7);
  const ingresosMes=datos.finanzas.ingresos.filter(i=>i.fecha.startsWith(mesActual)).reduce((s,i)=>s+(i.monto||0),0);
  const egresosMes=datos.finanzas.egresos.filter(e=>e.fecha.startsWith(mesActual)).reduce((s,e)=>s+(e.monto||0),0);
  let html='<h2>Resumen general</h2>';
  html+=`<div class="stat-grid">
    <div class="stat-box"><div class="lbl">Pacientes totales</div><div class="val">${datos.pacientes.length}</div></div>
    <div class="stat-box"><div class="lbl">Citas hoy</div><div class="val">${citasHoy.length}</div></div>
    <div class="stat-box"><div class="lbl">Ingresos del mes</div><div class="val" style="color:#1B6B47">${fmt(ingresosMes)}</div></div>
    <div class="stat-box"><div class="lbl">Egresos del mes</div><div class="val" style="color:#8A2020">${fmt(egresosMes)}</div></div>
  </div>`;
  html+='<h3>Citas de hoy</h3>';
  if(citasHoy.length===0)html+='<div class="card">No hay citas programadas para hoy.</div>';
  citasHoy.forEach(c=>{
    const badgeClass=c.estado==='CONFIRMADA'?'b-green':c.estado==='PENDIENTE'?'b-amber':c.estado==='CANCELADA'?'b-red':'b-blue';
    html+=`<div class="list-item"><div class="row"><strong>${c.hora} — ${nombrePaciente(c.pacienteId)}</strong><span class="badge ${badgeClass}">${c.estado}</span></div><div style="font-size:11px;color:#5A7A82;margin-top:4px">${c.tipo}</div></div>`;
  });
  document.getElementById('content').innerHTML=html;
}

function pacientes(){
  let html='<h2>Pacientes ('+datos.pacientes.length+')</h2>';
  html+=`<div id="buscadorPacientes" style="margin-bottom:12px"><input id="inputBuscador" type="text" placeholder="🔍 Buscar paciente por nombre..." style="width:100%;padding:12px;border:1px solid #D8ECF0;border-radius:8px;font-size:14px;letter-spacing:0.5px"></div>`;
  html+=`<div id="tablaPacientes"></div>`;
  html+=`<button class="btn-add" onclick="datos.pacientes.push({id:uid(),nombre:'',telefono:'',edad:'',tipo:'GENERAL',alergias:'',notas:'',fecha:hoy()});guardar();pacientes()">+ Agregar paciente</button>`;

  const inputBuscador=document.getElementById('inputBuscador');

    filtroPacientes=this.value.toLowerCase();

  actualizarTablaPacientes();

function actualizarTablaPacientes(){
  const filtrados=datos.pacientes.filter(p=>p.nombre.toLowerCase().includes(filtroPacientes)).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  let html='';

  if(filtroPacientes.length===0){
    html='<div class="card" style="padding:20px;text-align:center;color:#5A7A82"><p>Escribe el nombre de un paciente para buscarlo</p><p style="font-size:12px">Total de pacientes: '+datos.pacientes.length+'</p></div>';
  } else if(filtrados.length===0){
    html='<div class="card">No se encontraron pacientes con ese nombre</div>';
  } else {
    html='<div class="table-wrapper"><table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Edad</th><th>Tratamiento</th><th>Alergias</th><th></th></tr></thead><tbody>';
    filtrados.forEach((p)=>{
      const i=datos.pacientes.indexOf(p);
      html+=`<tr><td><strong>${p.nombre.toUpperCase()}</strong></td><td><input type="text" value="${p.telefono}" oninput="datos.pacientes[${i}].telefono=this.value;guardar()" style="width:140px"></td><td><input type="number" value="${p.edad}" style="width:50px" oninput="datos.pacientes[${i}].edad=this.value;guardar()"></td><td><select oninput="datos.pacientes[${i}].tipo=this.value;guardar()">${tiposTratamiento.map(t=>`<option ${p.tipo===t?'selected':''}>${t}</option>`).join('')}</select></td><td><input type="text" value="${p.alergias||''}" oninput="datos.pacientes[${i}].alergias=this.value;guardar()"></td><td style="white-space:nowrap"><button class="btn-secondary" style="padding:5px 8px;font-size:10px;margin-right:4px" onclick="extraerTelefonoPDF('${p.nombre}',${i})">📄Tel</button><button class="btn-delete" onclick="if(confirm('¿Eliminar?')){datos.pacientes.splice(${i},1);guardar();pacientes()}">✕</button></td></tr>`;
    });
    html+='</tbody></table></div>';
  }

  document.getElementById('tablaPacientes').innerHTML=html;
}

function agenda(){
  if(!fechaAgenda)fechaAgenda=hoy();
  let html='<h2>Agenda de citas</h2>';
  html+='<div class="card"><h3 style="margin-top:0">Nueva cita</h3><div class="form-grid">';

  html+=`<div><label>Hora</label><input type="time" id="nc-hora" value="09:00"></div>`;
  html+=`<div class="full"><label>Notas</label><input id="nc-notas" placeholder="Opcional"></div>`;
  html+='</div><button class="btn-add" onclick="agregarCita()">+ Agendar cita</button></div>';
  const diaAnterior=new Date(fechaAgenda);diaAnterior.setDate(diaAnterior.getDate()-1);
  const diaSiguiente=new Date(fechaAgenda);diaSiguiente.setDate(diaSiguiente.getDate()+1);
  html+='<div class="card"><div style="display:flex;gap:10px;align-items:center">';
  html+=`<button style="padding:8px 12px;background:#75D0E1;color:#fff;border:0;border-radius:8px;cursor:pointer" onclick="fechaAgenda='${diaAnterior.toISOString().split('T')[0]}';agenda()">← Anterior</button>`;

  html+='</div></div>';
  const citasDelDia=[...datos.citas].filter(c=>c.fecha===fechaAgenda).sort((a,b)=>a.hora.localeCompare(b.hora));
  html+=`<h3>Citas del ${fechaAgenda}</h3>`;
  if(citasDelDia.length===0)html+='<div class="card">No hay citas programadas para este día.</div>';

async function sincronizarDrive(){
  if(!googleAccessToken){alert('No autorizado. Intenta de nuevo.');return}

  alert('Sincronizando archivos de Google Drive... (puede tardar)');
  driveFilesCache={};
  let archivosEncontrados=0;
  let pacientesCreados=0;

  for(const folderId of DRIVE_FOLDER_IDS){
    try{
      let pageToken=null;
      let hasMore=true;
      while(hasMore){
        const url=`https://www.googleapis.com/drive/v3/files?q='${folderId}' in parents and mimeType='application/pdf'&access_token=${googleAccessToken}&fields=files(id,name,modifiedTime),nextPageToken&pageSize=1000${pageToken?'&pageToken='+pageToken:''}`;
        const response=await fetch(url);
        const data=await response.json();

        if(data.files){
          data.files.forEach(file=>{
            const nombrePaciente=file.name.replace('.pdf','').trim();
            const nombreNormalizado=nombrePaciente.toLowerCase().replace(/\s+/g,' ');
            archivosEncontrados++;
            if(!driveFilesCache[nombreNormalizado]){driveFilesCache[nombreNormalizado]=[];}
            driveFilesCache[nombreNormalizado].push({...file,driveFileId:file.id});
            const pacienteExiste=datos.pacientes.find(p=>p.nombre.toLowerCase().replace(/\s+/g,' ')===nombreNormalizado);
            if(!pacienteExiste){
              datos.pacientes.push({
                id:uid(),nombre:nombrePaciente,telefono:'',edad:'',tipo:'GENERAL',alergias:'',notas:'Creado desde Drive',fecha:hoy()
              });
              pacientesCreados++;
            }
          });
        }
        pageToken=data.nextPageToken;
        hasMore=!!pageToken;
      }
    }catch(e){console.error('Error folder '+folderId,e);}
  }

  guardar();
  alert(`✅ Sincronización completada.\n${archivosEncontrados} archivos\n${pacientesCreados} pacientes nuevos`);
  pacientes();
}

async function extraerTelefonoPDF(nombrePaciente,indexPaciente){
  if(!googleAccessToken){alert('Sincroniza con Drive primero.');return}
  const nombreLower=nombrePaciente.toLowerCase();
  const archivos=driveFilesCache[nombreLower];
  if(!archivos||archivos.length===0){alert('No hay PDF para este paciente');return}
  const archivo=archivos[0];
  try{
    alert('Extrayendo teléfono...');
    const pdf=await fetch(`https://www.googleapis.com/drive/v3/files/${archivo.driveFileId}?alt=media&access_token=${googleAccessToken}`).then(r=>r.arrayBuffer());
    const doc=await pdfjsLib.getDocument({data:pdf}).promise;
    let telefonoEncontrado='';
    for(let i=1;i<=Math.min(doc.numPages,3);i++){
      const page=await doc.getPage(i);
      const text=await page.getTextContent();
      const fullText=text.items.map(i=>i.str).join(' ');
      const regex=/\b\d{3}[-.\s]?\d{3}[-.\s]?\d{4}\b|\b\d{10}\b/;
      const match=fullText.match(regex);
      if(match){telefonoEncontrado=match[0];break}
    }
    if(telefonoEncontrado){
      datos.pacientes[indexPaciente].telefono=telefonoEncontrado;
      guardar();
      alert('✅ Teléfono encontrado: '+telefonoEncontrado);
      pacientes();
    }else{
      alert('❌ No se encontró teléfono en el PDF');
    }
  }catch(e){
    console.error(e);
    alert('Error al procesar PDF');
  }
}

function agregarRadiografia(indexHistoria){

  if(datos.historias[indexHistoria].radiografias.length>=5){alert('Máximo 5 radiografías');return}

  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    datos.historias[indexHistoria].radiografias.push(e.target.result);
    guardar();
    input.value='';
    mostrarHistoria();
  };
  reader.readAsDataURL(file);
}

  html+=`<div class="full"><label>Px (medicamentos e indicaciones)</label><textarea id="rc-contenido" placeholder="Ej. Amoxicilina 500mg, tomar 1 cápsula cada 8 horas por 7 días"></textarea></div>`;
  html+='</div><button class="btn-add" onclick="agregarReceta()">+ Guardar receta</button></div>';

  html+='<h3>Recetas guardadas</h3>';
  const recetasOrdenadas=[...datos.recetas].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(recetasOrdenadas.length===0)html+='<div class="card">Aún no hay recetas guardadas.</div>';
  recetasOrdenadas.forEach(r=>{
    const i=datos.recetas.indexOf(r);
    html+=`<div class="list-item"><div class="row"><strong>${r.fecha} — ${nombrePaciente(r.pacienteId)}</strong><div><button onclick="imprimirReceta('${r.id}')">Imprimir</button> <button class="btn-delete" onclick="if(confirm('¿Eliminar receta?')){datos.recetas.splice(${i},1);guardar();recetario()}">✕</button></div></div><div style="font-size:11px;color:#5A7A82;margin-top:4px;white-space:pre-wrap">${r.contenido}</div></div>`;
  });
  document.getElementById('content').innerHTML=html;
}

function agregarReceta(){
  const pacienteId=document.getElementById('rc-pac').value;
  if(!pacienteId){alert('Primero agrega un paciente en la pestaña Pacientes');return}
  const contenido=document.getElementById('rc-contenido').value;
  if(!contenido.trim()){alert('Escribe el contenido de la receta');return}
  datos.recetas.push({id:uid(),pacienteId,fecha:document.getElementById('rc-fecha').value,contenido});
  guardar();recetario();
}

function imprimirReceta(id){
  const r=datos.recetas.find(x=>x.id===id);

  </style></head><body>
  <div class="rx-header">${logoSvgGrande()}<div><h1>Punto Dental</h1><div class="tag">Transformamos sonrisas construyendo confianza</div></div></div>
  <div class="rx-doc-row"><h2>${DOCTOR.nombre}</h2><div>Fecha&nbsp;&nbsp;${fechaFmt}</div></div>

async function generarPDFHistoria(){
  if(!historiaSeleccionada){alert('Selecciona un paciente');return}
  const paciente=datos.pacientes.find(p=>p.id===historiaSeleccionada);
  const h=datos.historias.find(x=>x.pacienteId===historiaSeleccionada);
  if(!paciente||!h){alert('Historia no encontrada');return}

  alert('Generando PDF...');
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();
    let yPos=20;
    const pageHeight=doc.internal.pageSize.height;

    doc.setFontSize(16);
    doc.text('HISTORIA CLINICA',105,yPos,{align:'center'});
    yPos+=10;

    doc.setFontSize(10);
    doc.text(`Paciente: ${paciente.nombre.toUpperCase()}`,20,yPos);
    yPos+=6;
    doc.text(`Teléfono: ${paciente.telefono}`,20,yPos);
    yPos+=6;
    doc.text(`Edad: ${paciente.edad} años`,20,yPos);
    yPos+=6;
    doc.text(`Alergias: ${paciente.alergias||'Ninguna'}`,20,yPos);
    yPos+=10;

    doc.setFontSize(12);
    doc.text('TRATAMIENTOS',20,yPos);
    yPos+=8;

    doc.setFontSize(9);
    h.tratamientos.forEach(t=>{
      const saldo=(t.costo||0)-(t.abono||0);
      if(yPos>pageHeight-20){doc.addPage();yPos=20}
      doc.text(`Fecha: ${t.fecha}`,25,yPos);
      yPos+=4;
      doc.text(`Tratamiento: ${t.tx}`,25,yPos);
      yPos+=4;
      doc.text(`Costo: $${t.costo} | Abono: $${t.abono} | Saldo: $${saldo}`,25,yPos);
      yPos+=6;
    });

    yPos+=5;
    doc.setFontSize(12);
    doc.text('OBSERVACIONES',20,yPos);
    yPos+=6;
    doc.setFontSize(9);
    const obsLines=doc.splitTextToSize(h.observaciones||'Ninguna',170);
    doc.text(obsLines,20,yPos);
    yPos+=obsLines.length*4+10;

    if(h.radiografias&&h.radiografias.length>0){
      doc.addPage();
      doc.setFontSize(14);
      doc.text('RADIOGRAFIAS',105,20,{align:'center'});
      let radioYPos=35;
      for(let i=0;i<h.radiografias.length;i++){
        if(radioYPos>pageHeight-40){doc.addPage();radioYPos=20}
        doc.text(`Radiografía ${i+1}`,20,radioYPos);
        radioYPos+=5;
        try{
          doc.addImage(h.radiografias[i],'JPEG',20,radioYPos,170,100);
          radioYPos+=110;
        }catch(e){console.error(e)}
      }
    }

    const filename=`${paciente.nombre.toLowerCase().replace(/\s+/g,'_')}_${new Date().getFullYear()}.pdf`;
    doc.save(filename);
    alert('✅ PDF descargado: '+filename);
  }catch(e){
    console.error(e);
    alert('Error generando PDF');
  }
}

async function obtenerOCrearCarpetaDrive(nombreCarpeta){
  try{
    const response=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${nombreCarpeta}' and mimeType='application/vnd.google-apps.folder' and trashed=false&access_token=${googleAccessToken}&fields=files(id)`);
    const data=await response.json();
    if(data.files&&data.files.length>0)return data.files[0].id;

    const createResponse=await fetch('https://www.googleapis.com/drive/v3/files?access_token='+googleAccessToken,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:nombreCarpeta,mimeType:'application/vnd.google-apps.folder'})
    });
    const createData=await createResponse.json();
    return createData.id;
  }catch(e){
    console.error(e);
    throw new Error('Error accediendo a Drive');
  }
}

async function subirArchivoADrive(blob,nombre,carpetaId){
  try{
    const formData=new FormData();
    formData.append('metadata',new Blob([JSON.stringify({name:nombre,parents:[carpetaId]})],{type:'application/json'}));
    formData.append('file',blob);

    const response=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&access_token='+googleAccessToken,{
      method:'POST',
      body:formData
    });
    return await response.json();
  }catch(e){
    console.error(e);
    throw new Error('Error subiendo archivo');
  }
}
