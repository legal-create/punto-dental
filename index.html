<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Punto Dental</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI';background:#E8F7FA;color:#1A1A1A;font-size:14px}
.login{position:fixed;top:0;left:0;right:0;bottom:0;background:#75D0E1;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#FFFFFF;padding:36px 24px;border-radius:16px;text-align:center;width:90%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.login-box h2{color:#1A1A1A;margin-bottom:6px;font-size:22px;font-weight:700}
.login-box p.tag{color:#75D0E1;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px}
.login-box input{padding:12px;margin:10px 0;width:100%;border:1px solid #D8ECF0;border-radius:8px;background:#F5FBFC;color:#1A1A1A;font-size:16px}
.login-box button{background:#75D0E1;color:#FFFFFF;padding:12px 20px;border:0;border-radius:8px;cursor:pointer;margin-top:12px;font-size:14px;font-weight:600;width:100%;text-transform:uppercase;letter-spacing:0.5px}
.container{max-width:100%;margin:0;padding:10px}
.header{background:#FFFFFF;padding:16px;border-radius:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.header .logo{width:48px;height:48px;border-radius:50%;background:#75D0E1;display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-weight:700;font-size:24px;flex-shrink:0}
.header h1{color:#1A1A1A;font-size:18px;font-weight:700}
.tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;background:#FFFFFF;padding:8px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,0.05);overflow-x:auto}
.tab-btn{padding:9px 12px;background:#F5FBFC;border:1px solid #E8F7FA;border-radius:10px;cursor:pointer;white-space:nowrap;font-size:12px;color:#1A1A1A;font-weight:600;flex-shrink:0}
.tab-btn.active{background:#75D0E1;color:#FFFFFF;border-color:#75D0E1}
.content{background:#FFFFFF;padding:16px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
table{border-collapse:collapse;font-size:11px;width:100%}
th{background:#F5FBFC;padding:8px 6px;text-align:left;border-bottom:2px solid #E8F7FA;font-size:10px;color:#5A7A82;font-weight:700;text-transform:uppercase}
td{padding:6px;border-bottom:1px solid #F0F7F9;font-size:11px;color:#1A1A1A}
input,select,textarea{padding:8px;border:1px solid #E0EEF1;border-radius:6px;font-size:12px;background:#FAFDFE;color:#1A1A1A;font-family:inherit}
button{padding:8px 12px;background:#75D0E1;color:#FFFFFF;border:0;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;margin:4px}
.btn-delete{background:#FFC9C9;color:#8A2020}
.btn-add{width:100%;margin-top:10px;padding:10px;background:#75D0E1}
.btn-secondary{background:#D6EFF5;color:#1A6B7D}
.btn-download{background:#B8E8D4;color:#1B6B47}
h2{margin:8px 0 12px;font-size:15px;color:#1A1A1A;font-weight:700}
h3{margin:10px 0 8px;font-size:13px;font-weight:700;color:#1A1A1A}
.card{background:#F5FBFC;border-radius:10px;padding:12px;margin-bottom:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.form-grid.full{grid-template-columns:1fr}
label{font-size:10px;color:#5A7A82;font-weight:700;text-transform:uppercase;display:block;margin-bottom:4px}
textarea{width:100%;min-height:80px;resize:vertical;font-family:inherit}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:10000}
.modal-overlay.active{display:flex}
.modal{background:#FFFFFF;padding:20px;border-radius:14px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.gallery-modal{background:rgba(0,0,0,0.95);width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:0;max-width:none;max-height:none}
.gallery-img{max-width:90%;max-height:80%;object-fit:contain}
.gallery-nav{display:flex;gap:16px;align-items:center;margin-top:16px;color:#FFFFFF}
.badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;margin:2px}
.badge-ok{background:#B8E8D4;color:#1B6B47}
.badge-pending{background:#FFD9B8;color:#8A4A0A}
.table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tooth-grid{display:grid;grid-template-columns:repeat(4,40px);gap:8px;margin:10px 0}
.tooth{width:100%;aspect-ratio:1;border:2px solid #B8D8DE;border-radius:8px;cursor:pointer;background:#FFFFFF;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.2s}
.tooth.sano{background:#B8E8D4;border-color:#7AC799}
.tooth.tratado{background:#FFD9B8;border-color:#E8A85C}
.tooth.extraido{background:#FFC9C9;border-color:#E88A8A}
.tooth:hover{opacity:0.8}
</style>
</head>
<body>

<div id="login" class="login">
<div class="login-box">
<h2>Punto Dental</h2>
<p class="tag">Panel de administración</p>
<input type="text" id="user" placeholder="USUARIO" onkeypress="if(event.key==='Enter')doLogin()">
<input type="password" id="pwd" placeholder="CONTRASEÑA" onkeypress="if(event.key==='Enter')doLogin()">
<button onclick="doLogin()">ACCEDER</button>
</div>
</div>

<div id="app" style="display:none">
<div class="container">
<div class="header">
<div class="logo">🦷</div>
<div>
<h1>Punto Dental</h1>
<small style="color:#5A7A82">Panel de administración</small>
</div>
<div style="margin-left:auto">
<button class="btn-secondary" onclick="doLogout()" style="margin:0">SALIR</button>
</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
</div>
</div>

<div id="rxGallery" class="modal-overlay">
<div class="modal gallery-modal" style="position:relative">
<button onclick="cerrarGaleria()" style="position:absolute;top:10px;right:20px;background:none;border:none;color:#FFF;font-size:28px;cursor:pointer;z-index:10001">✕</button>
<img id="rxImg" src="" class="gallery-img" style="margin-top:40px">
<div class="gallery-nav">
<button onclick="cambiarImagen(-1)" class="btn-secondary">← Anterior</button>
<span id="rxCounter" style="color:#FFFFFF;min-width:60px;text-align:center">1/1</span>
<button onclick="cambiarImagen(1)" class="btn-secondary">Siguiente →</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const SUPABASE_URL='https://nzbyunsgeotmqwwouugi.supabase.co';
const SUPABASE_KEY='sb_publishable_xEVrQ0wcO0okc-1ydOtD5w_Tq8i_hzl';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const usuarios={'dra. maria':'1234','consultorio':'1234'};
let usuarioActual=null,rolActual=null,userId=null,datos={pacientes:[],historias:[],citas:[],finanzas:[]};
let historiaSeleccionada=null,filtroPacientes='',filtroHistorias='',galeriaRxActual={idx:-1,archivos:[]};

async function doLogin(){
  const user=document.getElementById('user').value.toLowerCase();
  const pwd=document.getElementById('pwd').value;
  if(usuarios[user]&&usuarios[user]===pwd){
    usuarioActual=user;
    rolActual=user==='dra. maria'?'admin':'trabajador';
    userId=user;
    localStorage.setItem('usuarioActual',usuarioActual);
    localStorage.setItem('rolActual',rolActual);
    localStorage.setItem('userId',userId);
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    await cargarDatos();
    renderTabs();
    mostrarPestana('dashboard');
    setInterval(cargarDatos,2500);
  }else alert('Usuario o contraseña incorrectos');
}

function doLogout(){
  localStorage.clear();
  location.reload();
}

async function cargarDatos(){
  try{
    const {data}=await supabaseClient.from('dental').select('datos').eq('user_id',userId).maybeSingle();
    if(data&&data.datos){datos=data.datos}
    else{
      datos={pacientes:[],historias:[],citas:[],finanzas:[]};
      await guardarDatos();
    }
  }catch(err){console.error('Error cargando:',err)}
}

async function guardarDatos(){
  try{
    await supabaseClient.from('dental').upsert({user_id:userId,datos},{onConflict:'user_id'});
  }catch(err){console.error('Error guardando:',err)}
}

function renderTabs(){
  const tabs=['Dashboard','Pacientes','Agenda','Finanzas','Historias Clínicas','Recetario'];
  let html='';
  tabs.forEach(t=>html+=`<button class="tab-btn" onclick="mostrarPestana('${t.toLowerCase().replace(/ /g,'')}');">${t}</button>`);
  document.getElementById('tabs').innerHTML=html;
}

function mostrarPestana(p){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event?.target?.classList.add('active');

  if(p==='dashboard')dashboard();
  else if(p==='pacientes')pacientes();
  else if(p==='agenda')agenda();
  else if(p==='finanzas')finanzas();
  else if(p==='historiasclinicas')historiasClinicas();
  else if(p==='recetario')recetario();
}

function dashboard(){
  const totalPacientes=datos.pacientes.length;
  const totalHistorias=datos.historias.length;
  const totalCitas=datos.citas.length;
  const html=`<h2>Dashboard</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      <div class="card"><div style="font-size:12px;color:#5A7A82">Pacientes</div><div style="font-size:24px;font-weight:700;margin-top:8px">${totalPacientes}</div></div>
      <div class="card"><div style="font-size:12px;color:#5A7A82">Historias</div><div style="font-size:24px;font-weight:700;margin-top:8px">${totalHistorias}</div></div>
      <div class="card"><div style="font-size:12px;color:#5A7A82">Citas</div><div style="font-size:24px;font-weight:700;margin-top:8px">${totalCitas}</div></div>
    </div>`;
  document.getElementById('content').innerHTML=html;
}

function pacientes(){
  let html=`<h2>Pacientes (${datos.pacientes.length})</h2>
    <div style="margin-bottom:12px">
      <input type="text" id="buscador" placeholder="🔍 Buscar..." style="width:100%" onkeyup="actualizarPacientes()">
    </div>
    <button class="btn-add" onclick="agregarPaciente()">+ Nuevo Paciente</button>
    <div id="listaPacientes" style="margin-top:12px"></div>`;
  document.getElementById('content').innerHTML=html;
  actualizarPacientes();
}

function actualizarPacientes(){
  const filtro=(document.getElementById('buscador')?.value||'').toLowerCase();
  const filtrados=datos.pacientes.filter(p=>p.nombre.toLowerCase().includes(filtro));
  let html='<div style="margin-top:12px">';

  filtrados.forEach((p,i)=>{
    html+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700">${p.nombre}</div>
        <div style="font-size:11px;color:#5A7A82">${p.telefono||'Sin teléfono'} | ${p.edad||'—'} años</div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn-secondary" style="padding:6px 8px;font-size:10px" onclick="editarPaciente(${i})">Editar</button>
        <button class="btn-delete" style="padding:6px 8px;font-size:10px" onclick="borrarPaciente(${i})">Eliminar</button>
      </div>
    </div>`;
  });

  html+='</div>';
  document.getElementById('listaPacientes').innerHTML=html;
}

function agregarPaciente(){
  const nombre=prompt('Nombre del paciente:');
  if(nombre){
    datos.pacientes.push({id:uid(),nombre:nombre.trim(),telefono:'',edad:'',tipo:'GENERAL',alergias:'',fecha:hoy()});
    guardarDatos();
    actualizarPacientes();
  }
}

function editarPaciente(i){
  const p=datos.pacientes[i];
  let html=`<h2>Editar: ${p.nombre}</h2>
    <div class="form-grid">
      <div><label>Nombre</label><input type="text" id="inp_nombre" value="${p.nombre}"></div>
      <div><label>Teléfono</label><input type="text" id="inp_telefono" value="${p.telefono||''}"></div>
      <div><label>Edad</label><input type="number" id="inp_edad" value="${p.edad||''}"></div>
      <div><label>Alergias</label><input type="text" id="inp_alergias" value="${p.alergias||''}"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-add" style="margin:0;flex:1" onclick="guardarEdicionPaciente(${i})">Guardar</button>
      <button class="btn-secondary" style="margin:0;flex:1" onclick="pacientes()">Cancelar</button>
    </div>`;
  document.getElementById('content').innerHTML=html;
}

function guardarEdicionPaciente(i){
  datos.pacientes[i].nombre=document.getElementById('inp_nombre').value;
  datos.pacientes[i].telefono=document.getElementById('inp_telefono').value;
  datos.pacientes[i].edad=document.getElementById('inp_edad').value;
  datos.pacientes[i].alergias=document.getElementById('inp_alergias').value;
  guardarDatos();
  pacientes();
}

function borrarPaciente(i){
  if(confirm('¿Eliminar paciente?')){
    datos.pacientes.splice(i,1);
    datos.historias=datos.historias.filter(h=>h.pacienteId!==datos.pacientes[i]?.id);
    guardarDatos();
    pacientes();
  }
}

function historiasClinicas(){
  if(historiaSeleccionada){
    mostrarHistoria();
    return;
  }

  let html=`<h2>Historias Clínicas</h2>
    <div style="margin-bottom:12px">
      <input type="text" id="buscadorHist" placeholder="🔍 Buscar paciente..." style="width:100%" onkeyup="actualizarHistorias()">
    </div>
    <div id="listaHistorias"></div>`;
  document.getElementById('content').innerHTML=html;
  actualizarHistorias();
}

function actualizarHistorias(){
  const filtro=(document.getElementById('buscadorHist')?.value||'').toLowerCase();
  const filtrados=datos.pacientes.filter(p=>p.nombre.toLowerCase().includes(filtro));

  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px">';

  filtrados.forEach(p=>{
    const hist=datos.historias.find(h=>h.pacienteId===p.id);
    const btn=hist?`<button class="btn-secondary" style="width:100%;margin-top:8px" onclick="historiaSeleccionada='${p.id}';historiasClinicas()">Editar Historia</button>`:
      `<button class="btn-add" style="width:100%;margin-top:8px" onclick="crearHistoria('${p.id}')">Crear Historia</button>`;

    html+=`<div class="card">
      <div style="font-weight:700;font-size:13px">${p.nombre}</div>
      <div style="font-size:11px;color:#5A7A82;margin-top:4px">${p.telefono||'Sin teléfono'}</div>
      <div style="margin-top:6px">${hist?'<span class="badge badge-ok">✓ Existe</span>':'<span class="badge badge-pending">Pendiente</span>'}</div>
      ${btn}
    </div>`;
  });

  html+='</div>';
  document.getElementById('listaHistorias').innerHTML=html;
}

function crearHistoria(pacienteId){
  datos.historias.push({
    id:uid(),
    pacienteId,
    direccion:'',
    alergicoA:'',
    enfermedadCronica:'',
    diagnosticos:[],
    observaciones:'',
    tratamientos:[],
    odontograma:{},
    radiografias:[],
    proximaCita:''
  });
  guardarDatos();
  historiaSeleccionada=pacienteId;
  historiasClinicas();
}

function mostrarHistoria(){
  const p=datos.pacientes.find(x=>x.id===historiaSeleccionada);
  const hidx=datos.historias.findIndex(x=>x.pacienteId===historiaSeleccionada);
  const h=datos.historias[hidx];

  if(!p||!h){
    historiaSeleccionada=null;
    historiasClinicas();
    return;
  }

  let html=`<h2>${p.nombre}</h2>
    <div class="form-grid full">
      <label>Dirección</label>
      <input type="text" id="h_direccion" value="${h.direccion}">

      <label>Alérgico a</label>
      <input type="text" id="h_alergicoA" value="${h.alergicoA}">

      <label>Enfermedad o padecimiento crónico</label>
      <input type="text" id="h_enfermedadCronica" value="${h.enfermedadCronica}">

      <label>Observaciones</label>
      <textarea id="h_observaciones">${h.observaciones}</textarea>

      <label>Próxima cita</label>
      <input type="date" id="h_proximaCita" value="${h.proximaCita}">
    </div>

    <h3 style="margin-top:16px">Diagnóstico</h3>
    ${renderDiagnostico(hidx)}

    <h3 style="margin-top:16px">Tratamientos</h3>
    ${renderTratamientos(hidx)}

    <h3 style="margin-top:16px">Radiografías (RX)</h3>
    ${renderRx(hidx)}

    <h3 style="margin-top:16px">Odontograma</h3>
    ${renderOdontograma(hidx)}

    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn-add" onclick="guardarHistoria(${hidx})">💾 Guardar</button>
      <button class="btn-download" onclick="generarPDF('${p.nombre}')">📄 PDF</button>
      <button class="btn-secondary" onclick="historiaSeleccionada=null;historiasClinicas()">← Volver</button>
    </div>`;

  document.getElementById('content').innerHTML=html;
}

function guardarHistoria(hidx){
  datos.historias[hidx].direccion=document.getElementById('h_direccion').value;
  datos.historias[hidx].alergicoA=document.getElementById('h_alergicoA').value;
  datos.historias[hidx].enfermedadCronica=document.getElementById('h_enfermedadCronica').value;
  datos.historias[hidx].observaciones=document.getElementById('h_observaciones').value;
  datos.historias[hidx].proximaCita=document.getElementById('h_proximaCita').value;

  // Guardar diagnóstico
  const diag=document.getElementById('h_diag');
  if(diag) datos.historias[hidx].diagnosticos[0]=diag.value;

  // Guardar tratamientos
  datos.historias[hidx].tratamientos.forEach((t,i)=>{
    const tx=document.getElementById(`trat_tx_${i}`);
    const costo=document.getElementById(`trat_costo_${i}`);
    const abono=document.getElementById(`trat_abono_${i}`);
    if(tx) t.tx=tx.value;
    if(costo) t.costo=parseFloat(costo.value)||0;
    if(abono) t.abono=parseFloat(abono.value)||0;
  });

  guardarDatos();
  mostrarHistoria();
}

function renderDiagnostico(hidx){
  return `<input type="text" id="h_diag" placeholder="Diagnóstico" value="${datos.historias[hidx].diagnosticos[0]||''}" style="width:100%">`;
}

function renderTratamientos(hidx){
  let html='';
  datos.historias[hidx].tratamientos.forEach((t,i)=>{
    html+=`<div class="form-grid" style="margin-bottom:8px">
      <input type="text" id="trat_tx_${i}" placeholder="Tratamiento" value="${t.tx||''}">
      <input type="number" id="trat_costo_${i}" placeholder="Costo" value="${t.costo||0}">
      <input type="number" id="trat_abono_${i}" placeholder="Abono" value="${t.abono||0}">
      <button class="btn-delete" onclick="datos.historias[${hidx}].tratamientos.splice(${i},1);mostrarHistoria()">Eliminar</button>
    </div>`;
  });
  html+=`<button class="btn-add" onclick="datos.historias[${hidx}].tratamientos.push({tx:'',costo:0,abono:0});mostrarHistoria()">+ Agregar Tratamiento</button>`;
  return html;
}

function renderRx(hidx){
  let html=`<input type="file" id="fileRx_${hidx}" accept="image/*" style="display:none" onchange="cargarRx(${hidx},this)">
    <button class="btn-add" onclick="document.getElementById('fileRx_${hidx}').click()">+ Agregar RX</button>
    <div style="font-size:11px;color:#5A7A82;margin:8px 0">${datos.historias[hidx].radiografias.length}/5</div>`;

  if(datos.historias[hidx].radiografias.length>0){
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px">`;
    datos.historias[hidx].radiografias.forEach((r,i)=>{
      html+=`<div style="position:relative;border:1px solid #D8ECF0;border-radius:8px;overflow:hidden;height:80px;cursor:pointer" onclick="abrirGaleria(${i})">
        <img src="${r}" style="width:100%;height:100%;object-fit:cover">
        <button class="btn-delete" onclick="event.stopPropagation();datos.historias[${hidx}].radiografias.splice(${i},1);mostrarHistoria()" style="position:absolute;top:2px;right:2px;padding:2px 4px">✕</button>
      </div>`;
    });
    html+=`</div>`;
  }

  return html;
}

function renderOdontograma(hidx){
  const dientes=['11','12','13','14','15','16','17','18','21','22','23','24','25','26','27','28','31','32','33','34','35','36','37','38','41','42','43','44','45','46','47','48'];
  let html='<div class="tooth-grid">';

  dientes.forEach(n=>{
    const estado=datos.historias[hidx].odontograma[n]||'sano';
    html+=`<div class="tooth ${estado}" onclick="toggleDiente(${hidx},'${n}')">${n}</div>`;
  });

  html+='</div>';
  return html;
}

function toggleDiente(hidx,num){
  const estados=['sano','tratado','extraido'];
  const actual=datos.historias[hidx].odontograma[num]||'sano';
  const idx=(estados.indexOf(actual)+1)%3;
  datos.historias[hidx].odontograma[num]=estados[idx];
  guardarDatos();
  mostrarHistoria();
}

function cargarRx(hidx,input){
  if(datos.historias[hidx].radiografias.length>=5){alert('Máximo 5 RX');return}
  if(!input.files[0])return;

  const reader=new FileReader();
  reader.onload=e=>{
    datos.historias[hidx].radiografias.push(e.target.result);
    guardarDatos();
    mostrarHistoria();
    input.value='';
  };
  reader.readAsDataURL(input.files[0]);
}

function abrirGaleria(idx){
  const h=datos.historias.find(x=>x.pacienteId===historiaSeleccionada);
  galeriaRxActual={idx,archivos:h.radiografias};
  document.getElementById('rxGallery').classList.add('active');
  mostrarImagenActual();
}

function cerrarGaleria(){
  document.getElementById('rxGallery').classList.remove('active');
  galeriaRxActual={idx:-1,archivos:[]};
}

function cambiarImagen(dir){
  galeriaRxActual.idx+=dir;
  if(galeriaRxActual.idx<0)galeriaRxActual.idx=galeriaRxActual.archivos.length-1;
  if(galeriaRxActual.idx>=galeriaRxActual.archivos.length)galeriaRxActual.idx=0;
  mostrarImagenActual();
}

function mostrarImagenActual(){
  const img=document.getElementById('rxImg');
  img.src=galeriaRxActual.archivos[galeriaRxActual.idx];
  document.getElementById('rxCounter').textContent=`${galeriaRxActual.idx+1}/${galeriaRxActual.archivos.length}`;
}

async function generarPDF(nombre){
  const p=datos.pacientes.find(x=>x.id===historiaSeleccionada);
  const h=datos.historias.find(x=>x.pacienteId===historiaSeleccionada);

  const doc=new jspdf.jsPDF();
  doc.setFontSize(14);
  doc.text(`Historia Clínica: ${nombre}`,10,10);

  doc.setFontSize(10);
  let y=20;
  doc.text(`Fecha: ${hoy()}`,10,y);y+=8;
  doc.text(`Dirección: ${h.direccion||'—'}`,10,y);y+=8;
  doc.text(`Alérgico a: ${h.alergicoA||'—'}`,10,y);y+=8;
  doc.text(`Enfermedad: ${h.enfermedadCronica||'—'}`,10,y);y+=8;
  doc.text(`Diagnóstico: ${h.diagnosticos[0]||'—'}`,10,y);y+=8;
  doc.text(`Observaciones: ${h.observaciones||'—'}`,10,y);y+=8;

  doc.save(`${nombre}_historia.pdf`);
  alert('PDF generado');
}

function agenda(){
  let html=`<h2>Citas</h2>
    <button class="btn-add" onclick="mostrarCrearCita()">+ Nueva Cita</button>
    <div id="listaCitas" style="margin-top:12px"></div>`;
  document.getElementById('content').innerHTML=html;
  actualizarCitas();
}

function mostrarCrearCita(){
  let html=`<h2>Nueva Cita</h2>
    <div class="form-grid full">
      <label>Paciente</label>
      <select id="selectPaciente" style="width:100%">
        <option value="">— Seleccionar paciente —</option>`;

  datos.pacientes.forEach(p=>{
    html+=`<option value="${p.id}">${p.nombre}</option>`;
  });

  html+=`<option value="NUEVO">+ Paciente nuevo</option>
      </select>

      <div id="nuevoPacienteBox" style="display:none;margin-top:10px">
        <label>Nombre del nuevo paciente</label>
        <input type="text" id="nuevoPacienteNombre" placeholder="Nombre completo">
      </div>

      <label>Fecha</label>
      <input type="date" id="citaFecha" value="${hoy()}">

      <label>Hora</label>
      <input type="time" id="citaHora" value="09:00">

      <label>Tipo de cita</label>
      <select id="citaTipo">
        <option>Consulta</option>
        <option>Limpieza</option>
        <option>Tratamiento</option>
        <option>Seguimiento</option>
      </select>

      <label>Notas</label>
      <textarea id="citaNotas" placeholder="Observaciones..."></textarea>
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-add" style="flex:1;margin:0" onclick="guardarNuevaCita()">Guardar Cita</button>
      <button class="btn-secondary" style="flex:1;margin:0" onclick="agenda()">Cancelar</button>
    </div>`;

  document.getElementById('content').innerHTML=html;

  // Mostrar/ocultar input de nuevo paciente
  document.getElementById('selectPaciente').addEventListener('change',function(){
    const box=document.getElementById('nuevoPacienteBox');
    if(this.value==='NUEVO'){
      box.style.display='block';
      document.getElementById('nuevoPacienteNombre').focus();
    }else{
      box.style.display='none';
    }
  });
}

function guardarNuevaCita(){
  let pacienteId=document.getElementById('selectPaciente').value;
  const fecha=document.getElementById('citaFecha').value;
  const hora=document.getElementById('citaHora').value;
  const tipo=document.getElementById('citaTipo').value;
  const notas=document.getElementById('citaNotas').value;

  if(!pacienteId){
    alert('Selecciona un paciente');
    return;
  }

  // Si es paciente nuevo, crearlo primero
  if(pacienteId==='NUEVO'){
    const nombre=document.getElementById('nuevoPacienteNombre').value.trim();
    if(!nombre){
      alert('Ingresa el nombre del paciente');
      return;
    }
    pacienteId=uid();
    datos.pacientes.push({id:pacienteId,nombre,telefono:'',edad:'',tipo:'GENERAL',alergias:'',fecha:hoy()});
  }

  datos.citas.push({id:uid(),pacienteId,fecha,hora,tipo,notas});
  guardarDatos();
  agenda();
}

function actualizarCitas(){
  let html='<div>';

  if(datos.citas.length===0){
    html+='<div class="card" style="text-align:center;color:#5A7A82;padding:20px">Sin citas agendadas</div>';
  }else{
    // Ordenar citas por fecha y hora
    const citasOrdenadas=[...datos.citas].sort((a,b)=>{
      const cmp=a.fecha.localeCompare(b.fecha);
      return cmp!==0?cmp:a.hora.localeCompare(b.hora);
    });

    citasOrdenadas.forEach((c,i)=>{
      const p=datos.pacientes.find(x=>x.id===c.pacienteId);
      const realIdx=datos.citas.findIndex(x=>x.id===c.id);
      html+=`<div class="card">
        <div style="font-weight:700">${p?p.nombre:'Desconocido'}</div>
        <div style="font-size:11px;color:#5A7A82;margin:4px 0">📅 ${c.fecha} a las ${c.hora}</div>
        <div style="font-size:11px;color:#5A7A82">🏷️ ${c.tipo}</div>
        ${c.notas?`<div style="font-size:11px;margin-top:6px;color:#1A1A1A">${c.notas}</div>`:''}
        <button class="btn-delete" style="margin-top:8px;width:100%" onclick="datos.citas.splice(${realIdx},1);guardarDatos();actualizarCitas()">Eliminar</button>
      </div>`;
    });
  }

  html+='</div>';
  document.getElementById('listaCitas').innerHTML=html;
}

function finanzas(){
  let totalIngresos=0,totalGastos=0;
  datos.historias.forEach(h=>{
    h.tratamientos.forEach(t=>{
      totalIngresos+=parseFloat(t.abono)||0;
      totalGastos+=parseFloat(t.costo)-parseFloat(t.abono)||0;
    });
  });

  let html=`<h2>Finanzas</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div class="card"><div style="font-size:12px;color:#5A7A82">Ingresos</div><div style="font-size:24px;font-weight:700;margin-top:8px;color:#1B6B47">$${totalIngresos.toFixed(2)}</div></div>
      <div class="card"><div style="font-size:12px;color:#5A7A82">Por cobrar</div><div style="font-size:24px;font-weight:700;margin-top:8px;color:#8A4A0A">$${totalGastos.toFixed(2)}</div></div>
      <div class="card"><div style="font-size:12px;color:#5A7A82">Total tratamientos</div><div style="font-size:24px;font-weight:700;margin-top:8px">${datos.historias.reduce((s,h)=>s+h.tratamientos.length,0)}</div></div>
    </div>

    <h3>Desglose por paciente</h3>
    <div style="margin-top:12px">`;

  datos.pacientes.forEach(p=>{
    const hist=datos.historias.find(h=>h.pacienteId===p.id);
    if(hist&&hist.tratamientos.length>0){
      let subtotal=0;
      let cobrado=0;
      hist.tratamientos.forEach(t=>{
        subtotal+=parseFloat(t.costo)||0;
        cobrado+=parseFloat(t.abono)||0;
      });
      html+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700">${p.nombre}</div>
          <div style="font-size:11px;color:#5A7A82">${hist.tratamientos.length} tratamientos</div>
        </div>
        <div style="text-align:right;font-size:11px">
          <div>Total: $${subtotal.toFixed(2)}</div>
          <div style="color:#1B6B47;font-weight:700">Cobrado: $${cobrado.toFixed(2)}</div>
          <div style="color:#8A4A0A;font-weight:600">Por cobrar: $${(subtotal-cobrado).toFixed(2)}</div>
        </div>
      </div>`;
    }
  });

  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}

function recetario(){
  let html=`<h2>Recetario</h2>
    <button class="btn-add" onclick="agregarReceta()">+ Nueva Receta</button>
    <div id="listaRecetas" style="margin-top:12px"></div>`;
  document.getElementById('content').innerHTML=html;
  actualizarRecetas();
}

function actualizarRecetas(){
  if(!datos.recetas) datos.recetas=[];
  let html='<div>';

  if(datos.recetas.length===0){
    html+='<div class="card" style="text-align:center;color:#5A7A82;padding:20px">Sin recetas guardadas</div>';
  }else{
    datos.recetas.forEach((r,i)=>{
      html+=`<div class="card">
        <div style="font-weight:700">${r.paciente} - ${r.fecha}</div>
        <div style="font-size:11px;color:#5A7A82;margin:4px 0">${r.medicamentos.length} medicamentos</div>
        <div style="margin:8px 0;color:#1A1A1A;font-size:12px;line-height:1.4">${r.medicamentos.join(', ')}</div>
        <button class="btn-delete" style="width:100%" onclick="datos.recetas.splice(${i},1);guardarDatos();actualizarRecetas()">Eliminar</button>
      </div>`;
    });
  }

  html+='</div>';
  document.getElementById('listaRecetas').innerHTML=html;
}

function agregarReceta(){
  const paciente=prompt('Nombre del paciente:');
  if(!paciente)return;
  const medicamentos=prompt('Medicamentos (separados por coma):');
  if(!medicamentos)return;

  if(!datos.recetas) datos.recetas=[];
  datos.recetas.push({
    id:uid(),
    paciente,
    fecha:hoy(),
    medicamentos:medicamentos.split(',').map(m=>m.trim())
  });
  guardarDatos();
  actualizarRecetas();
}

function uid(){return 'id_'+Math.random().toString(36).substr(2,9)}
function hoy(){return new Date().toISOString().split('T')[0]}
